<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dissolve</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      background: #0f0f14;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .icon {
      width: 22px;
      height: 22px;
      background: linear-gradient(135deg, #63b3ed, #4299e1);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      line-height: 1.4;
    }

    .body {
      padding: 12px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #63b3ed, #4299e1);
      color: #0f0f14;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #90cdf4, #63b3ed);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 179, 237, 0.3);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
    }

    .hint {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      text-align: center;
      padding-top: 2px;
    }

    kbd {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      padding: 0px 4px;
      font-size: 9px;
      font-family: monospace;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title-row">
      <div class="icon">✦</div>
      <h1>Dissolve</h1>
    </div>
    <p class="subtitle">Click any element on the page to make it vanish.</p>
  </div>

  <div class="body">
    <button class="btn btn-primary" id="btn-activate">
      <span>✦</span> Hide Distracting Items
    </button>
    <button class="btn btn-secondary" id="btn-show-all">
      ↺ Show All Hidden Items
    </button>
    <p class="hint">
      While active: click to dissolve &nbsp;·&nbsp;
      <kbd>Z</kbd> undo &nbsp;·&nbsp;
      <kbd>Esc</kbd> done
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
