<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dissolve</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 200px;
      background: #101016;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px; height: 8px;
      background: #63b3ed;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(99,179,237,0.6);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.5; transform:scale(0.75); }
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .btn {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, #63b3ed, #4299e1);
      color: #0f0f16;
      font-weight: 700;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #90cdf4, #63b3ed);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>
  <div class="title-row">
    <div class="dot"></div>
    <h1>Dissolve</h1>
  </div>
  <button class="btn btn-primary" id="btn-activate">Hide Distracting Items</button>
  <button class="btn btn-secondary" id="btn-show-all">Unhide All</button>
  <script src="popup.js"></script>
</body>
</html>
